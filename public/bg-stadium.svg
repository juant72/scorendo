<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030c1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#020814;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01050a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="pitch-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:0" />
    </linearGradient>
    
    <radialGradient id="spotlight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    
    <pattern id="grid-pattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    
    <pattern id="dot-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="rgba(0,230,118,0.1)"/>
    </pattern>
    
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feComposite in="SourceGraphic" in2="noise" operator="overlay"/>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>
  <rect width="100%" height="100%" fill="url(#grid-pattern)" opacity="0.5"/>
  <rect width="100%" height="100%" fill="url(#dot-pattern)"/>
  <rect width="100%" height="100%" fill="url(#spotlight)"/>
  
  <!-- Stadium center glow -->
  <ellipse cx="50%" cy="100%" rx="60%" ry="40%" fill="url(#pitch-glow)"/>
</svg>